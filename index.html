<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="assests/images/logo.png" type="image/x-icon">
    <title>Quiz App</title>
    <link rel="stylesheet" href="assests/css/style.css">
</head>

<body>

    <div class="index">
        <img src="assests/images/iphone.png" alt="iphone.png">

        <div class="banner">
            <div class="splash-screen-container">
                <div class="splash-screen">
                    <img src="assests/images/logo.png" alt="iphone.png">
                </div>
            </div>

            <div class="index-main">
                <div class="content">
                    <img src="assests/images/logo.png" alt="iphone.png">
                    <h1>Quiz App</h1>
                </div>
                <div class="play-now">
                    <button id="play-now" onclick="changeDisplay()">Play Now</button>
                </div>
                <div class="footer">
                    <hr>
                    <p>Developed by <a href="https://daniyal-khan.com/" target="_blank" class="github-link">Daniyal Khan</a></p>
                </div>
            </div>
        </div>

    </div>


    <main class="main-content">
        <div class="main">
            <img src="assests/images/iphone.png" alt="iphone.png">
            <div class="app">
                <h1>Quiz</h1>
                <hr>
    
                <div class="quiz">
                    <h2 id="qq">Questions:</h2>
                    <div id="quiz-content">
                        <div class="quiz-content">
                            <img src="assests/images/logo.png" alt="iphone.png">
                            <h2>Result</h2>
                        </div>
                    </div>
    
                    <div class="quiz-container">
                        <h2 id="questions"></h2>
                        <h2 id="reult"></h2>

                        <div class="quiz-answers">
                            <div id="answer-buttons">
                            </div>
                            <button id="next-btn">Next</button>
                        </div>
                    </div>
    
                </div>
                <div class="footer">
                    <hr>
                    <p>Developed by <a href="https://daniyal-khan.com/" target="_blank" class="github-link">Daniyal Khan</a></p>
                </div>
            </div>
        </div>
    </main>

    <!-- JQUERY-->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <!-- JS -->
    <script src="assests/js/index.js"></script>
</body>

</html>
